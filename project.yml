name: PodpalSync
options:
  bundleIdPrefix: com.podpal
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  PodpalSync:
    type: application
    platform: macOS
    sources:
      - PodpalSync
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.podpal.sync
        INFOPLIST_FILE: PodpalSync/Info.plist
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
    entitlements:
      path: PodpalSync/PodpalSync.entitlements
      properties:
        com.apple.security.app-sandbox: false

  PodpalSyncTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - PodpalSyncTests
    dependencies:
      - target: PodpalSync
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.podpal.sync.tests
